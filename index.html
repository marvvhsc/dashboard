<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; font-weight: bold; }
        .entry { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        #total { font-size: 1.5em; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="card">
        <h2>💰 Total Spent: $<span id="total">0</span></h2>
        <input type="number" id="amount" placeholder="Amount ($)" inputmode="decimal">
        <input type="text" id="desc" placeholder="What did you buy?">
        <button onclick="addEntry()">Add Expense</button>
    </div>

    <h3>History</h3>
    <div id="history"></div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

        function updateUI() {
            const list = document.getElementById('history');
            const totalDisplay = document.getElementById('total');
            list.innerHTML = '';
            let total = 0;

            expenses.forEach((item, index) => {
                total += parseFloat(item.amount);
                list.innerHTML += `<div class="entry"><span>${item.desc}</span> <b>-$${item.amount}</b></div>`;
            });
            totalDisplay.innerText = total.toFixed(2);
        }

        function addEntry() {
            const amount = document.getElementById('amount').value;
            const desc = document.getElementById('desc').value;
            if (!amount || !desc) return;

            expenses.unshift({ amount, desc });
            localStorage.setItem('expenses', JSON.stringify(expenses));
            updateUI();
            
            document.getElementById('amount').value = '';
            document.getElementById('desc').value = '';
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        updateUI();
    </script>
</body>
</html>
